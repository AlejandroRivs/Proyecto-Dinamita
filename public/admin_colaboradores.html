<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeControl Pro - Colaboradores</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600&family=Manrope:wght@600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --tc-primary: #64242F;
            --tc-secondary: #B44446;
            --tc-tertiary: #FC8F8F;
            --tc-neutral: #fef8f7;
            --tc-text: #1d1b1b;
        }
        body {
            background-color: var(--tc-neutral);
            font-family: 'Hanken Grotesk', sans-serif;
            color: var(--tc-text);
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Manrope', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        
        /* Sidebar Styling */
        .sidebar {
            width: 250px;
            background-color: #fff;
            border-right: 1px solid rgba(0,0,0,0.05);
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 1000;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
        }
        .topbar {
            margin-left: 250px;
            height: 64px;
            background-color: #fff;
            box-shadow: 0px 4px 20px rgba(100,36,47,0.05);
            position: fixed;
            top: 0;
            right: 0;
            left: 0;
            z-index: 900;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 2rem;
        }
        .main-content {
            margin-left: 250px;
            margin-top: 64px;
            padding: 2rem;
            min-height: calc(100vh - 64px);
        }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .topbar { margin-left: 0; }
            .main-content { margin-left: 0; }
        }

        .nav-item-tc {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: #534344;
            border-radius: 0.5rem;
            text-decoration: none;
            transition: all 0.2s;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }
        .nav-item-tc:hover {
            background-color: #f3eceb;
            color: var(--tc-text);
        }
        .nav-item-tc.active {
            background-color: var(--tc-primary);
            color: #fff;
            font-weight: bold;
        }
        
        .card-tc {
            background-color: #fff;
            border-radius: 1rem;
            border: none;
            box-shadow: 0px 4px 20px rgba(100,36,47,0.05);
            padding: 1.5rem;
        }
        
        .avatar-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
            color: white;
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar d-none d-md-flex">
    <div class="mb-4">
        <h4 class="fw-bolder text-tc-primary m-0" style="color: var(--tc-primary);">TimeControl Pro</h4>
        <small class="text-muted">Panel Ejecutivo</small>
    </div>
    
    <nav class="flex-grow-1 d-flex flex-column gap-1">
        <a href="/admin.html" class="nav-item-tc">
            <span class="material-symbols-outlined">dashboard</span> Inicio
        </a>
        <a href="/admin_tareas.html" class="nav-item-tc">
            <span class="material-symbols-outlined">assignment</span> Tareas
        </a>
        <a href="/admin_colaboradores.html" class="nav-item-tc active">
            <span class="material-symbols-outlined">group</span> Colaboradores
        </a>
        <a href="/admin_config.html" class="nav-item-tc">
            <span class="material-symbols-outlined">settings</span> Configuración
        </a>
    </nav>
    
    <div class="mt-auto border-top pt-3 d-flex flex-column gap-1">
        <a href="#" class="nav-item-tc" id="logoutBtn">
            <span class="material-symbols-outlined">logout</span> Salir
        </a>
    </div>
</aside>

<!-- Topbar -->
<header class="topbar">
    <div class="d-flex align-items-center gap-3 border-start ps-3">
        <div class="text-end d-none d-sm-block">
            <div class="fw-bold m-0 lh-1" id="admin-name">Admin Pro</div>
            <small class="text-muted" style="font-size: 0.7rem;">Gestión Ejecutiva</small>
        </div>
        <div class="rounded-circle d-flex align-items-center justify-content-center text-white fw-bold shadow-sm border border-2 border-danger" style="width: 40px; height: 40px; background-color: var(--tc-primary);" id="admin-avatar">
            A
        </div>
    </div>
</header>

<!-- Main Content -->
<main class="main-content">
    <div class="container-fluid p-0">
        <div class="mb-4">
            <h3 class="fw-bold m-0" style="color: var(--tc-primary);">Directorio de Colaboradores</h3>
            <p class="text-muted">Rendimiento, puntajes y ranking del equipo.</p>
        </div>

        <div class="card-tc p-0 overflow-hidden mb-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead style="background-color: #f9f2f1;">
                        <tr>
                            <th class="py-3 px-4 text-muted small text-uppercase">Colaborador</th>
                            <th class="py-3 px-4 text-muted small text-uppercase text-end">Puntos de Recompensa</th>
                        </tr>
                    </thead>
                    <tbody id="colabs-body">
                        <tr><td colspan="2" class="text-center py-4">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/admin_colaboradores.js"></script>
</body>
</html>
