<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeControl Pro - Gestión de Tareas</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600&family=Manrope:wght@600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --tc-primary: #64242F;
            --tc-secondary: #B44446;
            --tc-tertiary: #FC8F8F;
            --tc-neutral: #fef8f7;
            --tc-text: #1d1b1b;
        }
        body {
            background-color: var(--tc-neutral);
            font-family: 'Hanken Grotesk', sans-serif;
            color: var(--tc-text);
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Manrope', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        
        /* Sidebar Styling */
        .sidebar {
            width: 250px;
            background-color: #fff;
            border-right: 1px solid rgba(0,0,0,0.05);
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 1000;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
        }
        .topbar {
            margin-left: 250px;
            height: 64px;
            background-color: #fff;
            box-shadow: 0px 4px 20px rgba(100,36,47,0.05);
            position: fixed;
            top: 0;
            right: 0;
            left: 0;
            z-index: 900;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 2rem;
        }
        .main-content {
            margin-left: 250px;
            margin-top: 64px;
            padding: 2rem;
            min-height: calc(100vh - 64px);
        }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .topbar { margin-left: 0; }
            .main-content { margin-left: 0; }
        }

        .nav-item-tc {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: #534344;
            border-radius: 0.5rem;
            text-decoration: none;
            transition: all 0.2s;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }
        .nav-item-tc:hover {
            background-color: #f3eceb;
            color: var(--tc-text);
        }
        .nav-item-tc.active {
            background-color: var(--tc-primary);
            color: #fff;
            font-weight: bold;
        }
        
        .card-tc {
            background-color: #fff;
            border-radius: 1rem;
            border: none;
            box-shadow: 0px 4px 20px rgba(100,36,47,0.05);
            padding: 1.5rem;
        }

        .btn-tc-primary {
            background-color: var(--tc-primary);
            color: #fff;
            border: none;
        }
        .btn-tc-primary:hover {
            background-color: #4a1922;
            color: #fff;
        }
        
        .status-badge {
            font-size: 0.65rem;
            font-weight: bold;
            padding: 0.2rem 0.6rem;
            border-radius: 50rem;
            text-transform: uppercase;
        }
        
        .avatar-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.75rem;
        }

    </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar d-none d-md-flex">
    <div class="mb-4">
        <h4 class="fw-bolder text-tc-primary m-0" style="color: var(--tc-primary);">TimeControl Pro</h4>
        <small class="text-muted">Panel Ejecutivo</small>
    </div>
    
    <nav class="flex-grow-1 d-flex flex-column gap-1">
        <a href="/admin.html" class="nav-item-tc">
            <span class="material-symbols-outlined">dashboard</span> Inicio
        </a>
        <a href="/admin_tareas.html" class="nav-item-tc active">
            <span class="material-symbols-outlined">assignment</span> Tareas
        </a>
        <a href="/admin_colaboradores.html" class="nav-item-tc">
            <span class="material-symbols-outlined">group</span> Colaboradores
        </a>
        <a href="/admin_config.html" class="nav-item-tc">
            <span class="material-symbols-outlined">settings</span> Configuración
        </a>
    </nav>
    
    <div class="mt-auto border-top pt-3 d-flex flex-column gap-1">
        <a href="#" class="nav-item-tc" id="logoutBtn">
            <span class="material-symbols-outlined">logout</span> Salir
        </a>
    </div>
</aside>

<!-- Topbar -->
<header class="topbar">
    <div class="d-flex align-items-center gap-3 border-start ps-3">
        <div class="text-end d-none d-sm-block">
            <div class="fw-bold m-0 lh-1" id="admin-name">Admin Pro</div>
            <small class="text-muted" style="font-size: 0.7rem;">Gestión Ejecutiva</small>
        </div>
        <div class="rounded-circle d-flex align-items-center justify-content-center text-white fw-bold shadow-sm border border-2 border-danger" style="width: 40px; height: 40px; background-color: var(--tc-primary);" id="admin-avatar">
            A
        </div>
    </div>
</header>

<!-- Main Content -->
<main class="main-content">
    <div class="container-fluid p-0">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="fw-bold m-0" style="color: var(--tc-primary);">Gestor de Tareas</h3>
                <p class="text-muted m-0">Administra todas las tareas y audita su estado.</p>
            </div>
            <div>
                <button class="btn btn-tc-primary d-flex align-items-center gap-2 shadow-sm" data-bs-toggle="modal" data-bs-target="#createTaskModal">
                    <span class="material-symbols-outlined">add_task</span> Nueva Tarea
                </button>
            </div>
        </div>

        <div class="card-tc p-0 overflow-hidden mb-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead style="background-color: #f9f2f1;">
                        <tr>
                            <th class="py-3 px-4 text-muted small text-uppercase">Tarea</th>
                            <th class="py-3 px-4 text-muted small text-uppercase">Asignado A</th>
                            <th class="py-3 px-4 text-muted small text-uppercase">Estado</th>
                            <th class="py-3 px-4 text-muted small text-uppercase">Puntos</th>
                            <th class="py-3 px-4 text-muted small text-uppercase text-center">Auditoría</th>
                        </tr>
                    </thead>
                    <tbody id="all-tasks-body">
                        <tr><td colspan="5" class="text-center py-4">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<!-- Create Task Modal -->
<div class="modal fade" id="createTaskModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border-radius: 1rem; border: none;">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold" style="color: var(--tc-primary);">Nueva Tarea</h5>
        <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="createTaskForm">
            <div id="taskError" class="alert alert-danger d-none small"></div>
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold">TÍTULO</label>
                <input type="text" class="form-control" id="taskTitle" required>
            </div>
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold">DESCRIPCIÓN</label>
                <textarea class="form-control" id="taskDesc" rows="3" required></textarea>
            </div>
            <div class="row">
                <div class="col-6 mb-3">
                    <label class="form-label text-muted small fw-bold">ASIGNAR A</label>
                    <select class="form-select" id="taskAssignee">
                        <option value="">Sin Asignar (Extra)</option>
                        <!-- Populated by JS -->
                    </select>
                </div>
                <div class="col-6 mb-3">
                    <label class="form-label text-muted small fw-bold">COMPLEJIDAD</label>
                    <select class="form-select" id="taskComplexity" required>
                        <option value="Simple">Simple</option>
                        <option value="Media">Media</option>
                        <option value="Compleja">Compleja</option>
                    </select>
                </div>
            </div>
            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-tc-primary py-2">Crear Tarea</button>
            </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/admin_tareas.js"></script>
</body>
</html>
