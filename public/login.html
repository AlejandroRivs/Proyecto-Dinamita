<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Proyecto Dinamita</title>
    <link rel="stylesheet" href="/estilos_css/styles.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="card" style="width: 100%; max-width: 420px; padding: 30px;">
        <h2 style="margin-top: 0; text-align: center; color: var(--accent-primary);">PROYECTO DINAMITA</h2>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 25px;">Sistema de Control de Tiempos e Incentivos</p>
        <div id="error" style="color: var(--danger); margin-bottom: 15px; font-weight: 500; text-align: center;"></div>
        
        <form id="loginForm">
            <div>
                <label for="username">Nombre de Usuario</label>
                <input type="text" id="username" required placeholder="Ingresa tu usuario">
            </div>
            <div>
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="Ingresa tu contraseña">
            </div>
            <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Iniciar Sesión</button>
        </form>

        <div style="margin-top: 25px; padding-top: 20px; border-top: 1px solid var(--border-color); font-size: 13px;">
            <strong style="color: var(--text-main);">Usuarios de Prueba:</strong>
            <ul style="margin: 5px 0; padding-left: 20px; color: var(--text-muted);">
                <li>Admin: <code style="color: var(--text-main);">alejandro</code> / <code style="color: var(--text-main);">admin123</code></li>
                <li>Colaboradores: <code style="color: var(--text-main);">luis</code> / <code style="color: var(--text-main);">luis123</code> (o maria, jose)</li>
            </ul>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = '';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                if (response.ok) {
                    if (data.user.role === 'admin') {
                        window.location.href = '/admin.html';
                    } else {
                        window.location.href = '/colaborador.html';
                    }
                } else {
                    errorDiv.textContent = data.error || 'Credenciales inválidas';
                }
            } catch (err) {
                errorDiv.textContent = 'Error de conexión con el servidor';
            }
        });
    </script>
</body>
</html>
