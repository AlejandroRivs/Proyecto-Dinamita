<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeControl Pro - Recompensas</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600&family=Manrope:wght@600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --tc-primary: #64242F;
            --tc-secondary: #B44446;
            --tc-tertiary: #FC8F8F;
            --tc-neutral: #fef8f7;
            --tc-text: #1d1b1b;
        }
        body {
            background-color: var(--tc-neutral);
            font-family: 'Hanken Grotesk', sans-serif;
            color: var(--tc-text);
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Manrope', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        
        /* Sidebar Styling */
        .sidebar {
            width: 250px;
            background-color: #fff;
            border-right: 1px solid rgba(0,0,0,0.05);
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 1000;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
        }
        .main-content {
            margin-left: 250px;
            padding: 2rem;
            min-height: 100vh;
        }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); transition: transform 0.3s ease; }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; }
        }

        .nav-item-tc {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: #534344;
            border-radius: 0.5rem;
            text-decoration: none;
            transition: all 0.2s;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }
        .nav-item-tc:hover {
            background-color: #f3eceb;
            color: var(--tc-text);
        }
        .nav-item-tc.active {
            background-color: var(--tc-primary);
            color: #fff;
            font-weight: bold;
        }
        
        .card-tc {
            background-color: #fff;
            border-radius: 1rem;
            border: none;
            box-shadow: 0px 4px 20px rgba(100,36,47,0.05);
            padding: 1.5rem;
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar d-none d-md-flex">
    <div class="mb-4">
        <h4 class="fw-bolder text-tc-primary m-0" style="color: var(--tc-primary);">TimeControl Pro</h4>
        <small class="text-muted">Gestión Ejecutiva</small>
    </div>
    
    <div class="d-flex align-items-center gap-3 mb-4">
        <div class="rounded-circle bg-secondary d-flex justify-content-center align-items-center text-white fw-bold" style="width: 40px; height: 40px; background-color: var(--tc-secondary) !important;" id="user-avatar">
            U
        </div>
        <div>
            <div class="fw-bold" style="font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;" id="sidebar-username">Usuario</div>
            <div class="text-uppercase text-muted" style="font-size: 0.65rem; letter-spacing: 1px;" id="sidebar-role">Colaborador</div>
        </div>
    </div>
    
    <nav class="flex-grow-1 d-flex flex-column gap-1">
        <a href="/colaborador.html" class="nav-item-tc">
            <span class="material-symbols-outlined">dashboard</span> Inicio
        </a>
        <a href="/colaborador_tareas.html" class="nav-item-tc">
            <span class="material-symbols-outlined">assignment</span> Mis Tareas
        </a>
        <a href="/colaborador_recompensas.html" class="nav-item-tc active">
            <span class="material-symbols-outlined">military_tech</span> Recompensas
        </a>
    </nav>
    
    <div class="mt-auto border-top pt-3 d-flex flex-column gap-1">
        <a href="#" class="nav-item-tc" id="logoutBtn">
            <span class="material-symbols-outlined">logout</span> Salir
        </a>
    </div>
</aside>

<!-- Main Content -->
<main class="main-content">
    <header class="mb-5 text-center">
        <h2 class="fw-bold" style="color: var(--tc-primary);">Centro de Recompensas</h2>
        <p class="text-muted">Tu esfuerzo se traduce en crecimiento corporativo.</p>
    </header>

    <div class="row g-4 justify-content-center">
        <!-- Puntos Card -->
        <div class="col-md-6 col-lg-4">
            <div class="card-tc text-center" style="background: linear-gradient(135deg, var(--tc-primary) 0%, var(--tc-secondary) 100%); color: white;">
                <span class="material-symbols-outlined mb-3" style="font-size: 4rem; color: var(--tc-tertiary);">stars</span>
                <h5 class="fw-bold text-uppercase" style="letter-spacing: 1px;">Balance Total</h5>
                <h1 class="display-3 fw-bold my-3"><span id="total-points">0</span></h1>
                <p class="small opacity-75 m-0">Puntos acumulados</p>
            </div>
        </div>
        
        <!-- Historial -->
        <div class="col-md-8 col-lg-6">
            <div class="card-tc h-100">
                <h5 class="fw-bold mb-4" style="color: var(--tc-primary);">Historial de Logros</h5>
                <div id="achievements-list">
                    <div class="text-center py-4 text-muted small">Cargando historial...</div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/colaborador_recompensas.js"></script>
</body>
</html>
